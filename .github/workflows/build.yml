name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Download pdfprint
        shell: pwsh
        run: |
          $tag = (gh release view --repo catprintlabs/pdfprint --json tagName | ConvertFrom-Json).tagName
          Write-Host "pdfprint version: $tag"
          gh release download --repo catprintlabs/pdfprint --pattern "pdfprint-windows-amd64.zip" --dir .
          Expand-Archive pdfprint-windows-amd64.zip -DestinationPath bin-tmp -Force
          Copy-Item bin-tmp\pdfprint.exe bin\
          Copy-Item -Recurse bin-tmp\gs bin\gs
          Remove-Item -Recurse bin-tmp
          [System.IO.File]::WriteAllText("bin\pdfprint-version.txt", $tag)
          Write-Host "Bundled files:"
          Get-Item bin\pdfprint.exe | Select-Object Name, @{N='Size(KB)';E={[math]::Round($_.Length/1KB,1)}}
          Get-ChildItem bin\gs\ | Select-Object Name, @{N='Size(KB)';E={[math]::Round($_.Length/1KB,1)}}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Windows installer
        run: npm run build:win -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
